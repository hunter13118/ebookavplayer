# Fly.io config for the VAE FastAPI backend.
# First deploy: fly launch --no-deploy  (pick region near you, e.g. iad)
# Then: fly volumes create vae_data --size 10 --region <same>
# See docs/FLY_DEPLOY.md

app = "vae-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  PORT = "8080"

[mounts]
  source = "vae_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "20s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/internal/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
