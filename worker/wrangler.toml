name = "vae-edge"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Standalone dev deploy for the VAE edge layer.
# Production: handlers are copied into milkman-webapp-portfolio at build time.
# Local bridge: npm run dev:worker  →  http://127.0.0.1:8600/projects/ebookavplayer/api

[dev]
port = 8600
local_protocol = "http"

[vars]
# PUBLIC_MEDIA_ORIGIN = "https://hunterthemilkman.com/projects/ebookavplayer/api"
#   Required for Pollinations image-to-image (must fetch /media/ refs over HTTPS).
# VAE_EPUB_MAX_IMAGES = "0"  # 0 = unlimited EPUB plate extract; set N to cap.
# ILLUSTRATION_MODE = "auto"  # auto | reference | moment | direct-use
# POLLINATIONS_I2I_MODEL = "kontext"  # seedream, klein, nanobanana also support refs
# VAE_CORS_ORIGINS = "https://my-tunnel.trycloudflare.com"

# Encrypted: wrangler secret put GEMINI_API_KEY
# Local secrets: copy worker/.dev.vars.example → worker/.dev.vars

[[r2_buckets]]
binding = "VAE_PACKS"
bucket_name = "vae-packs"

[[kv_namespaces]]
binding = "VAE_JOBS"
id = "00000000000000000000000000000000"  # replace after: wrangler kv namespace create VAE_JOBS

[[queues.producers]]
binding = "VAE_JOBS_QUEUE"
queue = "vae-jobs"

[[queues.producers]]
binding = "VAE_PACK_QUEUE"
queue = "vae-jobs"

[[queues.consumers]]
queue = "vae-jobs"
max_batch_size = 1
max_batch_timeout = 30
# A single ingest/continue-extract message runs its ENTIRE book's extraction
# (every chapter, BookNLP/annotate/LLM enrichment) inside one long-lived
# handler invocation before acking — tens of minutes for a real LLM-fallback
# book. Without this, max_concurrency defaults to 1, so a brand-new upload's
# message sits queued behind whatever book is already extracting, and its
# "instant mechanical baseline" never actually lands until the earlier job
# finishes — the exact bug where a fresh epub+m4b upload sat at "queued 0%"
# for the whole time another book was mid-annotate, so the m4b auto-attach
# (which only fires once the book is open in the Player) silently never ran.
# Raising this lets independent books' jobs run side by side instead of
# strictly FIFO; pack-build messages (VAE_PACK_QUEUE, same physical queue)
# benefit the same way.
max_concurrency = 4

# Separate physical queue for parallel per-chapter imaging (see
# chapter-extract-pipeline.js's onChapterComplete and
# worker/queue/chapter-imaging-consumer.js) — deliberately NOT sharing
# "vae-jobs" above. Cloudflare Queues runs each named queue's consumer
# independently, so art generation for an earlier chapter can proceed while
# a still-running continue-extract job keeps extracting later chapters on
# "vae-jobs", instead of queuing behind it the way pack-build does today.
# max_batch_size stays 1: a chapter's own pack file has no concurrent writer
# once written, but keeping this queue's consumer strictly one-at-a-time
# avoids ever needing to think about two chapter-imaging messages for the
# same book racing each other.
[[queues.producers]]
binding = "VAE_IMAGING_QUEUE"
queue = "vae-imaging"

[[queues.consumers]]
queue = "vae-imaging"
max_batch_size = 1
max_batch_timeout = 30

[[durable_objects.bindings]]
name = "JOB_EVENTS"
class_name = "JobEventHub"

[[migrations]]
tag = "v1-job-events"
new_sqlite_classes = ["JobEventHub"]
